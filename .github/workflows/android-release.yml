name: Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from commit count
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "VERSION=1.${COMMIT_COUNT}.0" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"
          echo "📦 Версия: 1.${COMMIT_COUNT}.0 (code: ${COMMIT_COUNT})"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Decode Keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.RELEASE_KEY_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEY_BASE64 }}" | base64 --decode > release-key.jks
            echo "keystore_path=$(pwd)/release-key.jks" >> "$GITHUB_OUTPUT"
            echo "keystore_password=${{ secrets.KEY_STORE_PASSWORD }}" >> "$GITHUB_OUTPUT"
            echo "key_alias=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_OUTPUT"
            echo "key_password=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_OUTPUT"
            echo "status=signed" >> "$GITHUB_OUTPUT"
          else
            echo "🔑 Secrets not found, generating temporary dev keystore"
            keytool -genkey -v -keystore release-key.jks \
              -storepass android -alias android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Dev, OU=Dev, O=Dev, L=Dev, S=Dev, C=US"
            echo "keystore_path=$(pwd)/release-key.jks" >> "$GITHUB_OUTPUT"
            echo "keystore_password=android" >> "$GITHUB_OUTPUT"
            echo "key_alias=android" >> "$GITHUB_OUTPUT"
            echo "key_password=android" >> "$GITHUB_OUTPUT"
            echo "status=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -x lintVitalAnalyzeRelease \
            -Pandroid.injected.signing.store.file=${{ steps.keystore.outputs.keystore_path }} \
            -Pandroid.injected.signing.store.password=${{ steps.keystore.outputs.keystore_password }} \
            -Pandroid.injected.signing.key.alias=${{ steps.keystore.outputs.key_alias }} \
            -Pandroid.injected.signing.key.password=${{ steps.keystore.outputs.key_password }}
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Prepare Artifacts
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p release-artifacts

          cp app/build/outputs/apk/debug/app-debug.apk \
            "release-artifacts/receipt-expense-tracker-${VERSION}-debug.apk"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
            "release-artifacts/receipt-expense-tracker-${VERSION}-release.apk" || true
          cp app/build/outputs/apk/release/app-release.apk \
            "release-artifacts/receipt-expense-tracker-${VERSION}-release.apk" 2>/dev/null || true

          ls -la release-artifacts/
          echo "✅ APK подготовлены"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## 📦 Автоматическая сборка
            - **Версия:** ${{ steps.version.outputs.VERSION }}
            - **Коммит:** `${{ github.sha }}`

            _Этот релиз создан автоматически._
          files: release-artifacts/*
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
