name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-increment tag
        id: tag_version
        if: github.ref == 'refs/heads/main'
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ steps.tag_version.outputs.new_tag }}
            VERSION=${VERSION#v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Текущая версия для сборки: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Decode Keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.RELEASE_KEY_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEY_BASE64 }}" | base64 --decode > release-key.jks
            echo "keystore_path=$(pwd)/release-key.jks" >> $GITHUB_OUTPUT
            echo "keystore_password=${{ secrets.KEY_STORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "key_alias=${{ secrets.KEY_ALIAS }}" >> $GITHUB_OUTPUT
            echo "key_password=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "status=signed" >> $GITHUB_OUTPUT
          else
            echo "🔑 Secrets not found, generating temporary dev keystore"
            keytool -genkey -v -keystore release-key.jks \
              -storepass android -alias android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Dev, OU=Dev, O=Dev, L=Dev, S=Dev, C=US"
            echo "keystore_path=$(pwd)/release-key.jks" >> $GITHUB_OUTPUT
            echo "keystore_password=android" >> $GITHUB_OUTPUT
            echo "key_alias=android" >> $GITHUB_OUTPUT
            echo "key_password=android" >> $GITHUB_OUTPUT
            echo "status=dev" >> $GITHUB_OUTPUT
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Build Release APK
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "📦 Сборка версии: $VERSION"
          ./gradlew assembleRelease --no-daemon \
            -x lintVitalAnalyzeRelease \
            -Pandroid.injected.signing.store.file=${{ steps.keystore.outputs.keystore_path }} \
            -Pandroid.injected.signing.store.password=${{ steps.keystore.outputs.keystore_password }} \
            -Pandroid.injected.signing.key.alias=${{ steps.keystore.outputs.key_alias }} \
            -Pandroid.injected.signing.key.password=${{ steps.keystore.outputs.key_password }}
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Prepare Artifacts
        id: prepare_artifacts
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          mkdir -p release-artifacts

          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)

          cp "$DEBUG_APK" "release-artifacts/receipt-expense-tracker-${VERSION}-debug.apk"
          echo "debug_path=release-artifacts/receipt-expense-tracker-${VERSION}-debug.apk" >> $GITHUB_OUTPUT

          cp "$RELEASE_APK" "release-artifacts/receipt-expense-tracker-${VERSION}-release.apk"
          echo "release_path=release-artifacts/receipt-expense-tracker-${VERSION}-release.apk" >> $GITHUB_OUTPUT

          echo "✅ APK подготовлены"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 📦 Автоматическая сборка
            - **Версия:** ${{ steps.get_version.outputs.VERSION }}
            - **Коммит:** `${{ github.sha }}`

            _Этот релиз создан автоматически._
          files: |
            ${{ steps.prepare_artifacts.outputs.debug_path }}
            ${{ steps.prepare_artifacts.outputs.release_path }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
