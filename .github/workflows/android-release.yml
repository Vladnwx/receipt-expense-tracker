name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-increment tag
        id: tag_version
        if: github.ref == 'refs/heads/main'
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ steps.tag_version.outputs.new_tag }}
            VERSION=${VERSION#v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Текущая версия для сборки: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Decode Keystore
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.RELEASE_KEY_BASE64 }}" | base64 --decode > release-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Signed APKs
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "📦 Сборка версии: $VERSION"
          ./gradlew assembleDebug assembleRelease --no-daemon \
            -x lintVitalAnalyzeRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Find Artifacts
        id: artifacts
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "debug_path=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_path=$RELEASE_APK" >> $GITHUB_OUTPUT
          echo "✅ Найдено: $DEBUG_APK и $RELEASE_APK"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 📦 Автоматическая сборка
            - **Версия:** ${{ steps.get_version.outputs.VERSION }}
            - **Коммит:** `${{ github.sha }}`

            _Этот релиз создан автоматически._
          files: |
            ${{ steps.artifacts.outputs.debug_path }}
            ${{ steps.artifacts.outputs.release_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
