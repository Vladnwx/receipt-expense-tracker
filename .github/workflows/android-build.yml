name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write GitHub Issues token to gradle.properties
        run: |
          if [ -n "${{ secrets.GITHUB_ISSUES_TOKEN }}" ]; then
            echo "githubIssuesToken=${{ secrets.GITHUB_ISSUES_TOKEN }}" >> gradle.properties
            echo "🔑 GitHub Issues token injected from secrets"
          else
            echo "⚠️ GITHUB_ISSUES_TOKEN secret not set — crash reports disabled in this build"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
