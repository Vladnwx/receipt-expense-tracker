# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# GitHub token for automatic issue creation (crash reports)
# Set your Personal Access Token here, e.g.:
# githubIssuesToken=ghp_your_token_here
# On first app launch after install, this token is auto-migrated to EncryptedSharedPreferences.
githubIssuesToken=
